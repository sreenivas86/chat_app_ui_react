name: AKS deployment
on: 
  push:
    branches:
      - main
    paths-ignore:
      - 'kubernetes/**'
      - '.github/**'

env:
  DOCKER_BACKEND_IMAGE: ${{secrets.DOCKER_USERNAME}}/${{vars.BACKEND_IMAGE_NAME}}:Ak_${{github.run_number}}
  DOCKER_FRONTEND_IMAGE: ${{secrets.DOCKER_USERNAME}}/${{vars.FRONTEND_IMAGE_NAME}}:Ak_${{github.run_number}}
jobs:
  backend:
    name: build backend image and push into docker hub
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      
      - name: login to docker hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: build docker image
        run: docker build -t $DOCKER_BACKEND_IMAGE -f ./backend/Dockerfile ./backend
      - name: push docker image
        run: docker push $DOCKER_BACKEND_IMAGE

  frontend:
    name: build frontend image and push into dockerhub
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        uses: actions/checkout@v6
      
      - name: login docker hub
        uses: docker/login-action@v4
        with:
          username: ${{secrets.DOCKER_USERNAME}}
          password: ${{secrets.DOCKER_PASSWORD}}
      - name: build image
        run: docker build -t $DOCKER_FRONTEND_IMAGE -f ./chat_ui/Dockerfile ./chat_ui
      - name: push image
        run: docker push $DOCKER_FRONTEND_IMAGE
  
  editPush:
    name: update image names on k8s manifest files
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    env:
      GIT_URL: "https://${{vars.GIT_USERNAME}}:${{secrets.GIT_TOKEN}}@github.com/${{vars.GIT_USERNAME}}/${{vars.GIT_REPO_NAME}}.git"
      BRANCH_NAME: pipeline_${{github.run_number}}
    steps:
      - name: checkout git
        uses: actions/checkout@v6
    
      - name: create and swith branch
        run: |
          git checkout -b $BRANCH_NAME
          git branch
      - name: update image names
        run: |
          chmod +x ./scripts/yq-editor.sh
          sh ./scripts/yq-editor.sh --file ./kubernetes/backend/Backend-Deployment.yml --image $DOCKER_BACKEND_IMAGE 
          sh  ./scripts/yq-editor.sh --file ./kubernetes/frontend/Frontend-deployment.yml --image $DOCKER_FRONTEND_IMAGE

      - name: push to $BRANCH_NAME
        run: |
          git add .
          git commit -m "update k8 files in $BRANCH_NAME"
          git push $GIT_URL $BRANCH_NAME
          echo "successfully executed ...."
      - name: merge into main brach
        run: |
          git switch main
          git merge $BRANCH_NAME
          git add .
          git commit -m " merge branch $BRANCH_NAME into main"
          git puhs $GIT_URL main
        
  k8s:
    name: connect to aks and run aks files
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: connect to azure
        uses: Azure/login@v3
        with:
          client-id: ${{secrets.AZURE_CLIENT_ID}}
          tenant-id: ${{secrets.AZURE_TENANT_ID}}
          subscription-id: ${{secrets.AZURE_SUBSCRIPTION_ID}}

      - name: set AKS context
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{vars.AKS_RESOURCE_GROUP}}
          cluster-name: ${{vars.AKS_CLUSTER_NAME}}
      - name: install kubectl
        uses: azure/setup-kubectl@v4

      - name: deploy main k8s
        run: |
          kubectl apply -f ./kubernetes/Namespace.yml
          kubectl apply -f ./kubernetes/mongodb
          kubectl apply -f ./kubernetes/backend/Backend-Service.yml
      
      - name: change config file
        run: |
          BACKEND_IP=$(kubectl get svc chat-app-backend-svc -n chat-app-ns -o jsonpath='{.status.loadBalancer.ingress[0].ip}') 
          chmod +x ./scripts/config-map-uri-change.sh
          sh ./scripts/config-map-uri-change.sh --file ./kubernetes/configs/ConfigMaps.yml "http://$BACKEND_IP:5000"
      
      # - name: k8s deploy
      #   uses: azure/k8s-deploy@v4.9
      #   with


      