apiVersion: apps/v1
kind: Deployment 
metadata:
  name: chat-app-backed-deploy
  namespace: chat-app-ns
  labels:
    app: chat-app-backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: chat-app-backend

  template:  
    metadata:
      labels: 
        app: chat-app-backend

    spec:
      containers:
        - name: chat-app-backend
          image: sree471/chat-app-backend:18
          imagePullPolicy: Always

          ports: 
            - containerPort: 5000    

          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: chat-app-cm
                  key: PORT

            - name: MONGO_URI
              valueFrom:
                configMapKeyRef:
                  name: chat-app-cm
                  key: MONGO_URI

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: chat-app-secret
                  key: JWT_SECRET

          volumeMounts:
            - name: chat-app-volume
              mountPath: "/app/uploads/chat"

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

      volumes:
        - name: chat-app-volume
          persistentVolumeClaim:
            claimName: chat-app-pvc
