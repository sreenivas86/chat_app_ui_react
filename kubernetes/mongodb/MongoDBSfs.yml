# StateFulSet is a K8s Object, manages stateful applications, provides persistant storage ,stabel networking, unique and order identies for pod.
# most time we uses for databases, cluster based application like kafka, rabbitmq etc

# write service for mongo db
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: chat-app-ns
spec:
  clusterIP: None # statefulset uses Domain based service discovery so clusterIp is not needed
  selector:
    app: mongodb
  ports:
    - port: 27017
      targetPort: 27017
---

# Mongo DB stateful set
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: chat-app-ns
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 27017
          args:
            - "--bind_ip_all"
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: mongo-data
          persistentVolumeClaim:
            claimName: mongodb-pvc
